name: Local-Mind CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Ruff
      run: |
        ruff check --output-format=github .
        ruff format --check .

    - name: Run Pytest (Unit Tests)
      env:
        # Mock environment variables so the app doesn't crash on import
        OLLAMA_HOST: "http://mocked-host:11434"
        MAIN_MODEL: "mock-model"
      run: |
        # Run only tests in the 'tests/' directory
        pytest tests/ -v --maxfail=1 --disable-warnings